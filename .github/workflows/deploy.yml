name: Build and Deploy to Dreamhost

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx @11ty/eleventy

      - name: Integrate world-narrative
        run: |
          git clone --depth 1 https://github.com/PipFoweraker/world-narrative.git /tmp/world-narrative
          mkdir -p _site/world-narrative
          cp -r /tmp/world-narrative/site _site/world-narrative/site
          cp -r /tmp/world-narrative/models _site/world-narrative/models
          cp /tmp/world-narrative/README.md _site/world-narrative/README.md
          # Redirect /world-narrative/ to /world-narrative/site/
          cat > _site/world-narrative/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0;url=site/">
          <link rel="canonical" href="/world-narrative/site/">
          </head><body><a href="site/">World Narrative</a></body></html>
          REDIRECT
          rm -rf /tmp/world-narrative

      - name: Verify build output
        run: |
          test -f _site/index.html || (echo "Build failed: no _site/index.html" && exit 1)
          echo "Build output:"
          find _site -type f | head -30
          echo "---"
          echo "Total files: $(find _site -type f | wc -l)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DREAMHOST_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 iad1-shared-b8-18.dreamhost.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.env*' \
            --exclude='backup-*' \
            --exclude='.dh-diag' \
            -e "ssh -i ~/.ssh/deploy_key" \
            _site/ \
            dh_gj4pen@iad1-shared-b8-18.dreamhost.com:/home/dh_gj4pen/pipfoweraker.com/

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pipfoweraker.com)
          echo "Site returned HTTP $STATUS"
          if [ "$STATUS" -ge 400 ]; then
            echo "Warning: site returned error status"
            exit 1
          fi
