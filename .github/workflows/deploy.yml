name: Build and Deploy to Dreamhost

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx @11ty/eleventy
        env:
          NODE_ENV: production

      - name: Integrate world-narrative
        run: |
          echo "::group::Clone world-narrative"
          git clone --depth 1 https://github.com/PipFoweraker/world-narrative.git /tmp/world-narrative
          echo "::endgroup::"

          mkdir -p _site/world-narrative
          cp -r /tmp/world-narrative/site _site/world-narrative/site
          cp -r /tmp/world-narrative/models _site/world-narrative/models
          cp /tmp/world-narrative/README.md _site/world-narrative/README.md

          # Redirect /world-narrative/ to /world-narrative/site/
          cat > _site/world-narrative/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html><head>
          <meta http-equiv="refresh" content="0;url=site/">
          <link rel="canonical" href="/world-narrative/site/">
          </head><body><a href="site/">World Narrative</a></body></html>
          REDIRECT

          rm -rf /tmp/world-narrative
          echo "world-narrative integrated: $(find _site/world-narrative -type f | wc -l) files"

      - name: Verify build output
        run: |
          FAIL=0

          # Core pages that must exist
          for page in index.html about/index.html projects/index.html essays/index.html contact/index.html; do
            if [ ! -f "_site/$page" ]; then
              echo "::error::Missing required page: _site/$page"
              FAIL=1
            fi
          done

          # Plausible analytics must be present in the base layout
          if ! grep -q 'plausible.io/js/script.js' _site/index.html; then
            echo "::error::Plausible analytics script missing from index.html"
            FAIL=1
          fi

          # RSS feed must exist and be valid XML
          if [ ! -f "_site/feed.xml" ]; then
            echo "::error::RSS feed missing"
            FAIL=1
          fi

          # World narrative must have been integrated
          if [ ! -f "_site/world-narrative/site/index.html" ]; then
            echo "::error::world-narrative integration failed — site/index.html missing"
            FAIL=1
          fi
          if [ ! -f "_site/world-narrative/models/events.json" ]; then
            echo "::error::world-narrative integration failed — events.json missing"
            FAIL=1
          fi

          # Summary
          TOTAL=$(find _site -type f | wc -l)
          echo "Build output: $TOTAL files"
          echo "::group::File listing"
          find _site -type f | sort
          echo "::endgroup::"

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Build verification failed"
            exit 1
          fi
          echo "Build verification passed"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DREAMHOST_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 iad1-shared-b8-18.dreamhost.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.env*' \
            --exclude='backup-*' \
            --exclude='.dh-diag' \
            -e "ssh -i ~/.ssh/deploy_key" \
            _site/ \
            dh_gj4pen@iad1-shared-b8-18.dreamhost.com:/home/dh_gj4pen/pipfoweraker.com/

      - name: Verify deployment
        run: |
          FAIL=0

          # Follow redirects, check final status
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" https://pipfoweraker.com)
          FINAL_URL=$(curl -sL -o /dev/null -w "%{url_effective}" https://pipfoweraker.com)
          echo "https://pipfoweraker.com → $FINAL_URL (HTTP $STATUS)"

          if [ "$STATUS" -ge 400 ]; then
            echo "::error::Homepage returned HTTP $STATUS"
            FAIL=1
          fi

          # Verify Plausible script is actually in the served HTML
          if ! curl -sL https://www.pipfoweraker.com/ | grep -q 'plausible.io/js/script.js'; then
            echo "::warning::Plausible analytics script not found in served HTML"
          fi

          # Spot-check key pages
          for path in about/ projects/ essays/ contact/ feed.xml; do
            PAGE_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "https://www.pipfoweraker.com/$path")
            if [ "$PAGE_STATUS" -ge 400 ]; then
              echo "::error::/$path returned HTTP $PAGE_STATUS"
              FAIL=1
            else
              echo "/$path → HTTP $PAGE_STATUS"
            fi
          done

          # Check world-narrative
          WN_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "https://www.pipfoweraker.com/world-narrative/")
          echo "/world-narrative/ → HTTP $WN_STATUS"
          if [ "$WN_STATUS" -ge 400 ]; then
            echo "::warning::world-narrative not accessible (may be first deploy)"
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Post-deploy verification failed"
            exit 1
          fi
          echo "Deployment verified successfully"
